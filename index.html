<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#4361ee">
<title>QR → Excel</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f2f2f7;color:#1c1c1e;padding:0 16px 24px;max-width:480px;margin:0 auto}
h1{font-size:22px;padding:14px 0 6px;text-align:center;background:linear-gradient(135deg,#4361ee,#7209b7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:10px;box-shadow:0 2px 12px rgba(0,0,0,.04)}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;width:100%;margin:4px 0;color:#fff}
.btn:active{opacity:.6}
.btn-primary{background:#4361ee}
.btn-success{background:#34c759}
.btn-gray{background:#f2f2f7;color:#1c1c1e}
.scanner-wrap{position:relative;width:100%;aspect-ratio:1/1;max-height:360px;overflow:hidden;border-radius:14px;background:#000;display:none}
.scanner-wrap.active{display:block}
#reader video{border-radius:14px;width:100%!important;height:auto!important}
#reader{width:100%!important}
#reader__scan_region{min-height:auto!important}
#reader__dashboard_section{display:none}
.field{width:100%;padding:12px;border:2px solid #e5e5ea;border-radius:12px;font-size:15px;outline:none;margin:4px 0;background:#f9f9f9}
.field:focus{border-color:#4361ee}
.hidden{display:none!important}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1c1c1e;color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;z-index:999;opacity:0;transition:.25s;pointer-events:none}
.toast.show{opacity:1}
.cfg{font-size:11px;background:#f0f7ff;border-radius:8px;padding:6px 10px;margin-bottom:6px;color:#1a404e}
.cfg input{width:100%;padding:6px 8px;border:1px solid #bddbff;border-radius:6px;font-size:12px;outline:none;margin:2px 0}
.cfg .row{display:flex;gap:4px;align-items:center}
.cfg .row input{flex:1}
.cfg .row button{padding:6px 10px;border:none;border-radius:6px;background:#4361ee;color:#fff;cursor:pointer;font-size:11px;font-weight:600}
</style>
</head>
<body>

<h1>QR → Excel</h1>

<div class="card">
  <div class="cfg">
    <div class="row">
      <input id="cfgToken" placeholder="Token">
      <input id="cfgChat" placeholder="Chat ID">
      <button id="btnSave">OK</button>
    </div>
  </div>
  <button class="btn btn-primary" id="btnScan">Сканировать чек</button>
  <div class="scanner-wrap" id="scannerWrap">
    <div id="reader"></div>
    <p class="status" id="scanStatus">Наведите камеру</p>
    <button class="btn btn-gray" id="btnStop">Закрыть</button>
  </div>
</div>

<div class="card hidden" id="resultCard">
  <div style="background:#f2f2f7;border-radius:12px;padding:10px;margin:4px 0;font-size:12px;line-height:1.5;max-height:200px;overflow-y:auto" id="preview"></div>
  <label style="font-size:13px;color:#8e8e93;margin:6px 0 3px">Наименование товара</label>
  <input class="field" id="fieldProduct" placeholder="Например: Молоко..." autocomplete="off">
  <button class="btn btn-success" id="btnSend">Отправить</button>
  <button class="btn btn-gray" id="btnSkip">Без названия</button>
</div>

<div class="toast" id="toast"></div>
<iframe name="tgFrame" id="tgFrame" style="display:none"></iframe>

<script>
var token=localStorage.getItem('tk')||'8816604840:AAGhrlFMgrz71sNgKxhgPnJvdmu0gbjtYEw';
var chat=localStorage.getItem('ch')||'8881681054';
var qr=null,scanning=false,lastData=null,lastRaw='',lastFull=null,tt=null;

function $(i){return document.getElementById(i)}
function tm(m,e){clearTimeout(tt);var t=$('toast');t.textContent=m;t.style.background=e?'#ff3b30':'#1c1c1e';t.classList.add('show');tt=setTimeout(function(){t.classList.remove('show')},2500)}

function pr(t){var d={};try{var p=t.startsWith('http')?new URL(t).searchParams:new URLSearchParams(t);for(var k of p.keys())d[k]=p.get(k)}catch(e){}return d}

function label(k){var m={'t':'Дата','s':'Сумма','fn':'ФН','i':'ФД','fp':'ФП','n':'Тип'};return m[k]||k}

function fmtAllQR(d){
  var s='ЧЕК ИЗ QR\n========================\n';
  for(var k in d)s+=label(k)+': '+d[k]+'\n';
  return s
}

function fmtReceipt(r){
  if(!r)return'';
  if(r.document&&r.document.receipt)r=r.document.receipt;
  if(r.receipt)r=r.receipt;
  if(!r.totalSum&&!r.items)return'';
  var s='\nПОЛНЫЙ ЧЕК\n========================\n';
  if(r.user)s+='Продавец: '+r.user+'\n';
  if(r.userInn)s+='ИНН: '+r.userInn+'\n';
  if(r.dateTime)s+='Дата: '+String(r.dateTime).replace('T',' ').slice(0,16)+'\n';
  if(r.operator)s+='Кассир: '+r.operator+'\n';
  if(r.kktRegId)s+='ККТ: '+r.kktRegId+'\n';
  if(r.email)s+='Email: '+r.email+'\n';
  if(r.phone)s+='Тел: '+r.phone+'\n';
  if(r.taxationType)s+='Система: '+r.taxationType+'\n';
  if(r.items){
    s+='========================\nТОВАРЫ:\n';
    r.items.forEach(function(it,i){
      var p=it.price?(it.price/100).toFixed(2):'0';
      var sm=it.sum?(it.sum/100).toFixed(2):'0';
      s+=(i+1)+'. '+it.name+' '+p+' x '+it.quantity+' = '+sm+'\n';
    })
  }
  s+='========================\n';
  if(r.totalSum)s+='ИТОГО: '+(r.totalSum/100).toFixed(2)+'\n';
  if(r.cashTotalSum)s+='Наличные: '+(r.cashTotalSum/100).toFixed(2)+'\n';
  if(r.ecashTotalSum)s+='Безнал: '+(r.ecashTotalSum/100).toFixed(2)+'\n';
  if(r.nds0)s+='НДС 0%: '+(r.nds0/100).toFixed(2)+'\n';
  if(r.nds10)s+='НДС 10%: '+(r.nds10/100).toFixed(2)+'\n';
  if(r.nds18)s+='НДС 18%: '+(r.nds18/100).toFixed(2)+'\n';
  if(r.fiscalDriveNumber)s+='ФН: '+r.fiscalDriveNumber+'\n';
  if(r.fiscalDocumentNumber)s+='ФД: '+r.fiscalDocumentNumber+'\n';
  if(r.fiscalSign)s+='ФП: '+r.fiscalSign+'\n';
  return s
}

function sendTG(text){
  var f=document.createElement('form');
  f.action=TG+'/sendMessage';f.method='POST';f.target='tgFrame';
  var c=document.createElement('input');c.name='chat_id';c.value=chat;f.appendChild(c);
  var t=document.createElement('input');t.name='text';t.value=text;f.appendChild(t);
  document.body.appendChild(f);f.submit();document.body.removeChild(f)
}

function sendFile(text){
  try{
    var f=document.createElement('form');
    f.action=TG+'/sendDocument';f.method='POST';f.target='tgFrame';f.enctype='multipart/form-data';
    var c=document.createElement('input');c.name='chat_id';c.value=chat;f.appendChild(c);
    var fi=document.createElement('input');fi.type='file';fi.name='document';
    var b=new Blob([text],{type:'text/plain;charset=utf-8'});
    var dt=new DataTransfer();dt.items.add(new File([b],'chek.txt',{type:'text/plain'}));
    fi.files=dt.files;f.appendChild(fi);
    document.body.appendChild(f);f.submit();document.body.removeChild(f)
  }catch(e){}
}

async function getReceipt(d){
  var fn=d.fn,fd=d.i,fp=d.fp;
  if(!fn||!fd||!fp)return null;
  var urls=[
    'https://corsproxy.io/?'+encodeURIComponent('https://proverkacheka.nalog.ru/v2/check/'+fn+'/'+fd+'/'+fp),
    'https://api.allorigins.win/raw?url='+encodeURIComponent('https://proverkacheka.nalog.ru/v2/check/'+fn+'/'+fd+'/'+fp),
    'https://corsproxy.io/?'+encodeURIComponent('https://proverkacheka.nalog.ru/check/'+fn+'/'+fd+'/'+fp),
    'https://api.allorigins.win/raw?url='+encodeURIComponent('https://proverkacheka.nalog.ru/check/'+fn+'/'+fd+'/'+fp),
    'https://corsproxy.io/?'+encodeURIComponent('https://receipt.tax/api/v1/check?fn='+fn+'&fd='+fd+'&fp='+fp),
    'https://corsproxy.io/?'+encodeURIComponent('https://ofdapi.ru/api/v1/check?fn='+fn+'&fd='+fd+'&fp='+fp)
  ];
  var results=await Promise.allSettled(urls.map(function(u){
    return new Promise(function(resolve,reject){
      var ac=new AbortController();var to=setTimeout(function(){ac.abort()},8000);
      fetch(u).then(function(r){clearTimeout(to);if(!r.ok)throw 0;return r.text()}).then(function(t){
        if(!t||t[0]!='{')throw 0;
        var j=JSON.parse(t);
        if(j.contents)try{j=JSON.parse(j.contents)}catch(e){}
        resolve(j)
      }).catch(function(){clearTimeout(to);reject()})
    })
  }));
  for(var i=0;i<results.length;i++){if(results[i].status=='fulfilled')return results[i].value}
  return null
}

async function sc(){
  if(scanning)return;
  $('scannerWrap').classList.add('active');
  $('scanStatus').textContent='Загрузка...';
  try{
    qr=new Html5Qrcode("reader");
    await qr.start({facingMode:"environment"},{fps:10,qrbox:{width:250,height:250}},
      function(t){if(scanning){scanning=false;sp();sr(t)}},function(){});
    scanning=true;$('scanStatus').textContent='Наведите камеру'
  }catch(e){$('scanStatus').textContent='Ошибка: '+e.message;setTimeout(function(){$('scannerWrap').classList.remove('active')},2000)}
}
function sp(){if(qr){try{qr.stop();qr.clear()}catch(e){}qr=null}scanning=false;$('scannerWrap').classList.remove('active')}

async function sr(raw){
  lastRaw=raw;lastData=pr(raw);lastFull=null;
  var h='<b>QR:</b> ';
  for(var k in lastData)h+=label(k)+'='+lastData[k]+'  ';
  h+='<br><em>Загрузка...</em>';
  $('preview').innerHTML=h;$('resultCard').classList.remove('hidden');

  try{lastFull=await getReceipt(lastData)}catch(e){lastFull=null}

  if(lastFull){var ff=fmtReceipt(lastFull);if(ff)h=h.replace('<em>Загрузка...</em>','<br><b>ПОЛНЫЙ ЧЕК:</b><br>'+ff.replace(/\n/g,'<br>'))}
  else{h=h.replace('<em>Загрузка...</em>','<br><em>Загружен</em>')}

  $('preview').innerHTML=h;$('fieldProduct').value='';
  setTimeout(function(){$('fieldProduct').focus()},300)
}

function doSend(product){
  if(!lastData)return;
  var msg=fmtAllQR(lastData);
  if(product)msg='Товар: '+product+'\n\n'+msg;
  if(lastFull){var ff=fmtReceipt(lastFull);if(ff)msg+=ff}
  if(lastData.fn)msg+='\nЧек: https://proverkacheka.nalog.ru/check/'+lastData.fn+'/'+lastData.i+'/'+lastData.fp;

  sendTG(msg);
  setTimeout(function(){try{sendFile(msg)}catch(e){}},500);

  tm('Отправлено!');
  $('resultCard').classList.add('hidden');lastData=null;lastFull=null
}

var TG='https://api.telegram.org/bot';
$('btnSave').onclick=function(){token=$('cfgToken').value.trim();chat=$('cfgChat').value.trim();localStorage.setItem('tk',token);localStorage.setItem('ch',chat);tm('Сохранено')};
$('cfgToken').value=token;$('cfgChat').value=chat;
$('btnSend').onclick=function(){doSend($('fieldProduct').value.trim())};
$('btnSkip').onclick=function(){doSend('')};
$('btnScan').onclick=sc;$('btnStop').onclick=sp;
</script>
</body>
</html>
