<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#4361ee">
<title>QR → Excel</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f2f2f7;color:#1c1c1e;padding:0 16px 24px;max-width:480px;margin:0 auto}
h1{font-size:24px;padding:16px 0 2px;text-align:center;background:linear-gradient(135deg,#4361ee,#7209b7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:10px;box-shadow:0 2px 12px rgba(0,0,0,.04)}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;width:100%;margin:4px 0;color:#fff}
.btn:active{opacity:.6}
.btn-primary{background:#4361ee}
.btn-success{background:#34c759}
.btn-gray{background:#f2f2f7;color:#1c1c1e}
.scanner-wrap{position:relative;width:100%;aspect-ratio:1/1;max-height:360px;overflow:hidden;border-radius:14px;background:#000;display:none}
.scanner-wrap.active{display:block}
#reader video{border-radius:14px;width:100%!important;height:auto!important}
#reader{width:100%!important}
#reader__scan_region{min-height:auto!important}
#reader__dashboard_section{display:none}
.field{width:100%;padding:12px;border:2px solid #e5e5ea;border-radius:12px;font-size:15px;outline:none;margin:4px 0;background:#f9f9f9}
.field:focus{border-color:#4361ee}
.preview{background:#f2f2f7;border-radius:12px;padding:10px;margin:4px 0;font-size:12px;line-height:1.5;word-break:break-all;max-height:200px;overflow-y:auto}
.preview strong{color:#4361ee}
.hidden{display:none!important}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1c1c1e;color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;z-index:999;opacity:0;transition:.25s;pointer-events:none}
.toast.show{opacity:1}
.status{text-align:center;font-size:13px;padding:6px 0;color:#8e8e93}
.s-label{font-size:12px;font-weight:600;color:#8e8e93;margin:6px 0 2px;display:block}
.setup-bar{background:#f0f7ff;border:1px solid #bddbff;border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:12px;color:#1a404e;line-height:1.6}
.setup-bar .row{display:flex;gap:4px;align-items:center}
.setup-bar .row input{flex:1;padding:6px 8px;border:1px solid #bddbff;border-radius:6px;font-size:12px;outline:none}
.setup-bar .row button{padding:6px 10px;border:none;border-radius:6px;background:#4361ee;color:#fff;cursor:pointer;font-size:11px;font-weight:600}
</style>
</head>
<body>

<h1>QR → Excel</h1>

<div class="setup-bar">
  <div class="row">
    <input id="cfgToken" placeholder="Token" value="8816604840:AAGhrlFMgrz71sNgKxhgPnJvdmu0gbjtYEw">
    <input id="cfgChat" placeholder="Chat ID" value="8881681054">
    <button id="btnSave">Save</button>
  </div>
</div>

<div class="card">
  <button class="btn btn-primary" id="btnScan">Сканировать чек</button>
  <div class="scanner-wrap" id="scannerWrap">
    <div id="reader"></div>
    <p class="status" id="scanStatus">Наведите камеру на QR-код</p>
    <button class="btn btn-gray" id="btnStop">Закрыть</button>
  </div>
</div>

<div class="card hidden" id="resultCard">
  <div class="preview" id="preview"></div>
  <label style="font-size:13px;color:#8e8e93;margin:6px 0 3px">Наименование товара</label>
  <input class="field" id="fieldProduct" placeholder="Например: Молоко..." autocomplete="off">
  <button class="btn btn-success" id="btnSend">Отправить в Telegram</button>
  <button class="btn btn-gray" id="btnSkip">Без названия</button>
</div>

<div class="toast" id="toast"></div>

<script>
var token=localStorage.getItem('tk')||'8816604840:AAGhrlFMgrz71sNgKxhgPnJvdmu0gbjtYEw';
var chat=localStorage.getItem('ch')||'8881681054';
var qr=null,scanning=false,lastRaw='',lastQR={},lastCheck=null,tt=null;

function $(i){return document.getElementById(i)}
function tm(m,e){clearTimeout(tt);var t=$('toast');t.textContent=m;t.style.background=e?'#ff3b30':'#1c1c1e';t.classList.add('show');tt=setTimeout(function(){t.classList.remove('show')},2500)}

function parseQR(t){
  var d={};
  try{
    var p=t.startsWith('http')?new URL(t).searchParams:new URLSearchParams(t);
    for(var k of p.keys()){d[k]=p.get(k)}
  }catch(e){}
  return d
}

function kopToRub(k){return (k/100).toFixed(2)}

function formatReceipt(check,product){
  if(!check||!check.document)return null;
  var r=check.document.receipt;
  var s='';
  s+='📄 ПОЛНЫЙ ЧЕК\n';
  s+='═══════════════════════════════\n';
  s+='📦 Товар: '+(product||'—')+'\n';
  s+='🏪 Продавец: '+(r.user||'—')+'\n';
  s+='🔢 ИНН: '+(r.userInn||'—')+'\n';
  if(r.dateTime){var dt=r.dateTime.replace('T',' ').slice(0,16);s+='📅 '+dt+'\n'}
  s+='═══════════════════════════════\n';
  s+='  Товары:\n';
  if(r.items&&r.items.length){
    r.items.forEach(function(item,i){
      var name=item.name||'—';
      var price=kopToRub(item.price||0);
      var qty=item.quantity||1;
      var sum=kopToRub(item.sum||0);
      s+='  '+(i+1)+'. '+name+'\n';
      s+='     Цена: '+price+' x '+qty+' = '+sum+'\n'
    })
  }
  s+='═══════════════════════════════\n';
  s+='💰 ИТОГО: '+kopToRub(r.totalSum||0)+'\n';
  s+='🔢 ФН: '+(r.fiscalDriveNumber||'—')+'\n';
  s+='📄 ФД: '+(r.fiscalDocumentNumber||'—')+'\n';
  s+='✅ ФП: '+(r.fiscalSign||'—')+'\n';
  if(r.kktRegId)s+='🖨 ККТ: '+r.kktRegId+'\n';
  if(r.operator)s+='👤 Кассир: '+r.operator+'\n';
  return s
}

async function checkReceipt(qrData){
  var fn=qrData.fn||'';
  var fd=qrData.i||'';
  var fp=qrData.fp||'';
  if(!fn||!fd||!fp)return null;
  
  try{
    var r=await fetch('https://proverkacheka.nalog.ru/check/'+fn+'/'+fd+'/'+fp,{
      headers:{
        'Device-ID': crypto.randomUUID?crypto.randomUUID():'QR-Excel-001',
        'Device-OS':'iOS',
        'Version':'2.0'
      }
    });
    if(!r.ok){
      // Попробовать v2
      var r2=await fetch('https://proverkacheka.nalog.ru/v2/check/'+fn+'/'+fd+'/'+fp,{
        headers:{'Device-ID':crypto.randomUUID?crypto.randomUUID():'QR-Excel-001','Device-OS':'iOS','Version':'2.0'}
      });
      if(!r2.ok)return null;
      return await r2.json()
    }
    return await r.json()
  }catch(e){return null}
}

async function sendToPastebin(text){
  try{
    var r=await fetch('https://clbin.com',{method:'POST',body:text});
    var url=await r.text();
    if(url&&url.startsWith('http'))return url.trim()
  }catch(e){}
  return null
}

async function sc(){
  if(scanning)return;
  $('scannerWrap').classList.add('active');
  $('scanStatus').textContent='Загрузка...';
  try{
    qr=new Html5Qrcode("reader");
    await qr.start({facingMode:"environment"},{fps:10,qrbox:{width:250,height:250}},
      function(t){if(scanning){scanning=false;sp();sr(t)}},function(){});
    scanning=true;$('scanStatus').textContent='Наведите камеру на QR-код'
  }catch(e){$('scanStatus').textContent='Ошибка: '+e.message;setTimeout(function(){$('scannerWrap').classList.remove('active')},2000)}
}
function sp(){if(qr){try{qr.stop();qr.clear()}catch(e){}qr=null}scanning=false;$('scannerWrap').classList.remove('active')}

async function sr(raw){
  lastRaw=raw;
  lastQR=parseQR(raw);
  
  var html='<strong>QR данные:</strong><br>';
  for(var k in lastQR){
    var lb=k;if(k=='t')lb='Дата';else if(k=='s')lb='Сумма';else if(k=='fn')lb='ФН';else if(k=='i')lb='ФД';else if(k=='fp')lb='ФП';else if(k=='n')lb='Тип';
    html+='<strong>'+lb+':</strong> '+lastQR[k]+'<br>'
  }
  
  $('preview').innerHTML=html+'<br><em>Получаю полные данные...</em>';
  $('resultCard').classList.remove('hidden');
  
  // Запрос полных данных
  lastCheck=await checkReceipt(lastQR);
  if(lastCheck){
    var full=formatReceipt(lastCheck,'');
    if(full){
      var short=full.split('\n').slice(0,8).join('<br>');
      $('preview').innerHTML=html+'<br><strong>Полные данные получены!</strong><br>'+short+'<br>...'
    }
  } else {
    $('preview').innerHTML=html+'<br><em>Полные данные не получены (сервер не отвечает). Отправлю что есть.</em>'
  }
  
  $('fieldProduct').value='';
  setTimeout(function(){$('fieldProduct').focus()},300)
}

async function doSend(product){
  if(!lastQR)return;
  
  // Формируем сообщение
  var msg='';
  if(lastCheck){
    msg=formatReceipt(lastCheck,product)
  } else {
    msg='📄 ЧЕК (базовые данные)\n';
    for(var k in lastQR){
      var lb=k;if(k=='t')lb='Дата';else if(k=='s')lb='Сумма';else if(k=='fn')lb='ФН';else if(k=='i')lb='ФД';else if(k=='fp')lb='ФП';else if(k=='n')lb='Тип';
      msg+=lb+': '+lastQR[k]+'\n'
    }
  }
  if(product){msg='📦 Товар: '+product+'\n'+msg}
  
  try{
    // Отправляем сообщение
    var r=await fetch('https://api.telegram.org/bot'+token+'/sendMessage',{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:'chat_id='+chat+'&text='+encodeURIComponent(msg)
    });
    var j=await r.json();
    if(!j.ok){tm('Ошибка: '+(j.description||'?'),1);return}
    
    // Отправляем .txt файл напрямую
    try{
      var fd=new FormData();
      fd.append('chat_id',chat);
      fd.append('document',new Blob([msg],{type:'text/plain;charset=utf-8'}),'chek.txt');
      await fetch('https://api.telegram.org/bot'+token+'/sendDocument',{method:'POST',body:fd,mode:'no-cors'})
    }catch(e){}
    
    tm('Отправлено!');
    $('resultCard').classList.add('hidden');lastQR={};lastCheck=null
  }catch(e){tm('Нет интернета',1)}
}

$('btnSave').onclick=function(){
  token=$('cfgToken').value.trim();chat=$('cfgChat').value.trim();
  localStorage.setItem('tk',token);localStorage.setItem('ch',chat);
  tm('Сохранено')
};
$('btnSend').onclick=function(){doSend($('fieldProduct').value.trim())};
$('btnSkip').onclick=function(){doSend('')};
$('btnScan').onclick=sc;$('btnStop').onclick=sp;
$('cfgToken').value=token;$('cfgChat').value=chat;
</script>
</body>
</html>
