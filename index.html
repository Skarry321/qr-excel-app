<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="QR-Excel">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#4361ee">
<title>QR → Excel</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f2f2f7;color:#1c1c1e;padding:0 16px 24px;max-width:480px;margin:0 auto}
h1{font-size:24px;padding:16px 0 2px;text-align:center;background:linear-gradient(135deg,#4361ee,#7209b7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:10px;box-shadow:0 2px 12px rgba(0,0,0,.04)}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;width:100%;margin:4px 0;color:#fff}
.btn:active{opacity:.6}
.btn-primary{background:#4361ee}
.btn-success{background:#34c759}
.btn-gray{background:#f2f2f7;color:#1c1c1e}
.scanner-wrap{position:relative;width:100%;aspect-ratio:1/1;max-height:360px;overflow:hidden;border-radius:14px;background:#000;display:none}
.scanner-wrap.active{display:block}
#reader video{border-radius:14px;width:100%!important;height:auto!important}
#reader{width:100%!important}
#reader__scan_region{min-height:auto!important}
#reader__dashboard_section{display:none}
.field{width:100%;padding:12px;border:2px solid #e5e5ea;border-radius:12px;font-size:15px;outline:none;margin:4px 0;background:#f9f9f9}
.field:focus{border-color:#4361ee}
.preview{background:#f2f2f7;border-radius:12px;padding:10px;margin:4px 0;font-size:13px;line-height:1.7}
.preview strong{color:#4361ee}
.hidden{display:none!important}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1c1c1e;color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;z-index:999;opacity:0;transition:.25s;pointer-events:none}
.toast.show{opacity:1}
.status{text-align:center;font-size:13px;padding:6px 0;color:#8e8e93}
</style>
</head>
<body>

<h1>QR → Excel</h1>

<div class="card">
  <button class="btn btn-primary" id="btnScan">Сканировать чек</button>
  <div class="scanner-wrap" id="scannerWrap">
    <div id="reader"></div>
    <p class="status" id="scanStatus">Наведите камеру на QR-код</p>
    <button class="btn btn-gray" id="btnStop">Закрыть</button>
  </div>
</div>

<div class="card hidden" id="resultCard">
  <div class="preview" id="preview"></div>
  <label style="font-size:13px;color:#8e8e93;margin:6px 0 3px">Наименование товара</label>
  <input class="field" id="fieldProduct" placeholder="Например: Молоко..." autocomplete="off">
  <button class="btn btn-success" id="btnSend">Отправить в Telegram</button>
  <button class="btn btn-gray" id="btnSkip">Без названия</button>
</div>

<div class="toast" id="toast"></div>

<script>
var TG='https://api.telegram.org/bot8816604840:AAGhrlFMgrz71sNgKxhgPnJvdmu0gbjtYEw';
var CHAT='8881681054';
var qr=null,scanning=false,lastData=null,tt=null;

function $(i){return document.getElementById(i)}
function tm(m,e){clearTimeout(tt);var t=$('toast');t.textContent=m;t.style.background=e?'#ff3b30':'#1c1c1e';t.classList.add('show');tt=setTimeout(function(){t.classList.remove('show')},2500)}
function pr(t){var d={date:'',sum:'',num:''};try{var p=t.startsWith('http')?new URL(t).searchParams:new URLSearchParams(t);d.num=p.get('i')||p.get('fd')||'';d.sum=p.get('s')||'';var v=p.get('t')||'';if(v){var m=v.match(/^(\d{4})(\d{2})(\d{2})/);if(m)d.date=m[3]+'.'+m[2]+'.'+m[1]}}catch(e){}return d}

async function sc(){
  if(scanning)return;
  $('scannerWrap').classList.add('active');
  $('scanStatus').textContent='Загрузка...';
  try{
    qr=new Html5Qrcode("reader");
    await qr.start({facingMode:"environment"},{fps:10,qrbox:{width:250,height:250}},
      function(t){if(scanning){scanning=false;sp();sr(t)}},function(){});
    scanning=true;$('scanStatus').textContent='Наведите камеру на QR-код'
  }catch(e){$('scanStatus').textContent='Ошибка: '+e.message;setTimeout(function(){$('scannerWrap').classList.remove('active')},2000)}
}
function sp(){if(qr){try{qr.stop();qr.clear()}catch(e){}qr=null}scanning=false;$('scannerWrap').classList.remove('active')}
function sr(r){lastData=pr(r);$('preview').innerHTML='<strong>Дата:</strong> '+(lastData.date||'—')+'<br><strong>Сумма:</strong> '+(lastData.sum||'—')+'<br><strong>Номер:</strong> '+(lastData.num||'—');$('fieldProduct').value='';$('resultCard').classList.remove('hidden');setTimeout(function(){$('fieldProduct').focus()},300)}

async function doSend(product){
  if(!lastData)return;
  var msg='📄 Чек\nДата: '+(lastData.date||'—')+'\nТовар: '+(product||'—')+'\nСумма: '+(lastData.sum||'—')+'\nНомер: '+(lastData.num||'—');
  try{
    var r=await fetch(TG+'/sendMessage',{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:'chat_id='+CHAT+'&text='+encodeURIComponent(msg)
    });
    var j=await r.json();
    if(j.ok){tm('Отправлено!');$('resultCard').classList.add('hidden');lastData=null}
    else{tm('Ошибка: '+(j.description||'?'),1)}
  }catch(e){tm('Нет интернета',1)}
}

$('btnSend').onclick=function(){doSend($('fieldProduct').value.trim())};
$('btnSkip').onclick=function(){doSend('')};
$('btnScan').onclick=sc;$('btnStop').onclick=sp;
</script>
</body>
</html>
