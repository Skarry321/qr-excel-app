<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#4361ee">
<title>QR → Excel</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f2f2f7;color:#1c1c1e;padding:0 16px 24px;max-width:480px;margin:0 auto}
h1{font-size:24px;padding:16px 0 2px;text-align:center;background:linear-gradient(135deg,#4361ee,#7209b7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:10px;box-shadow:0 2px 12px rgba(0,0,0,.04)}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;width:100%;margin:4px 0;color:#fff}
.btn:active{opacity:.6}
.btn-primary{background:#4361ee}
.btn-success{background:#34c759}
.btn-gray{background:#f2f2f7;color:#1c1c1e}
.scanner-wrap{position:relative;width:100%;aspect-ratio:1/1;max-height:360px;overflow:hidden;border-radius:14px;background:#000;display:none}
.scanner-wrap.active{display:block}
#reader video{border-radius:14px;width:100%!important;height:auto!important}
#reader{width:100%!important}
#reader__scan_region{min-height:auto!important}
#reader__dashboard_section{display:none}
.field{width:100%;padding:12px;border:2px solid #e5e5ea;border-radius:12px;font-size:15px;outline:none;margin:4px 0;background:#f9f9f9}
.field:focus{border-color:#4361ee}
.preview{background:#f2f2f7;border-radius:12px;padding:10px;margin:4px 0;font-size:12px;line-height:1.5;max-height:250px;overflow-y:auto}
.preview strong{color:#4361ee}
.hidden{display:none!important}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1c1c1e;color:#fff;padding:12px 24px;border-radius:12px;font-size:14px;z-index:999;opacity:0;transition:.25s;pointer-events:none}
.toast.show{opacity:1}
.status{text-align:center;font-size:13px;padding:6px 0;color:#8e8e93}
</style>
</head>
<body>

<h1>QR → Excel</h1>

<div class="card">
  <button class="btn btn-primary" id="btnScan">Сканировать чек</button>
  <div class="scanner-wrap" id="scannerWrap">
    <div id="reader"></div>
    <p class="status" id="scanStatus">Наведите камеру на QR-код</p>
    <button class="btn btn-gray" id="btnStop">Закрыть</button>
  </div>
</div>

<div class="card hidden" id="resultCard">
  <div class="preview" id="preview"></div>
  <label style="font-size:13px;color:#8e8e93;margin:6px 0 3px">Наименование товара</label>
  <input class="field" id="fieldProduct" placeholder="Например: Молоко..." autocomplete="off">
  <button class="btn btn-success" id="btnSend">Отправить в Telegram</button>
  <button class="btn btn-gray" id="btnSkip">Без названия</button>
</div>

<div class="toast" id="toast"></div>

<script>
var TG='https://api.telegram.org/bot8816604840:AAGhrlFMgrz71sNgKxhgPnJvdmu0gbjtYEw';
var CHAT='8881681054';
var qr=null,scanning=false,lastData=null,lastFull=null,tt=null;

function $(i){return document.getElementById(i)}
function tm(m,e){clearTimeout(tt);var t=$('toast');t.textContent=m;t.style.background=e?'#ff3b30':'#1c1c1e';t.classList.add('show');tt=setTimeout(function(){t.classList.remove('show')},2500)}

function parseQR(t){var d={};try{var p=t.startsWith('http')?new URL(t).searchParams:new URLSearchParams(t);for(var k of p.keys())d[k]=p.get(k)}catch(e){}return d}

async function fetchWithProxy(url,hdrs,timeout){
  var ac=new AbortController();var to=setTimeout(function(){ac.abort()},timeout||5000);
  try{
    var r=await fetch(url,{headers:hdrs,signal:ac.signal});
    clearTimeout(to);if(r.ok)return await r.text()
  }catch(e){}clearTimeout(to);return null
}

function makeID(){return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,function(c){var r=Math.random()*16|0;return(c=='x'?r:(r&0x3|0x8)).toString(16)})}

async function getFullReceipt(qrData,rawText){
  var fn=qrData.fn||'',fd=qrData.i||'',fp=qrData.fp||'';
  var sum=qrData.s||'',tVal=qrData.t||'';
  
  // Если QR это URL - пробуем открыть его напрямую
  if(rawText&&(rawText.startsWith('http://')||rawText.startsWith('https://'))){
    try{
      var ac2=new AbortController();var to2=setTimeout(function(){ac2.abort()},5000);var r=await fetch(rawText,{signal:ac2.signal});clearTimeout(to2);
      if(r.ok){
        var txt=await r.text();
        var m=txt.match(/{[^]+?"totalSum"[^]+?}/);
        if(m)try{return JSON.parse(m[0])}catch(e){}
      }
    }catch(e){}
  }
  
  if(!fn||!fd||!fp)return null;
  
  var id=makeID();
  var hdrs={'Device-ID':id,'Device-OS':'iPhone 14','Version':'2.0','Accept':'application/json, text/plain, */*'};
  var dateParam=tVal?tVal.replace(/T.*/,''):'';
  var sumParam=sum?'&s='+sum:'';
  
  var attempts=[
    {url:'https://proverkacheka.nalog.ru/v2/check/'+fn+'/'+fd+'/'+fp,proxy:''},
    {url:'https://proverkacheka.nalog.ru/check/'+fn+'/'+fd+'/'+fp,proxy:''},
    {url:'https://proverkacheka.nalog.ru/v2/check/'+fn+'/'+fd+'/'+fp+'?fiscalSign='+fp+'&sum='+sum+sumParam,proxy:''},
    {url:'https://api.allorigins.win/raw?url='+encodeURIComponent('https://proverkacheka.nalog.ru/v2/check/'+fn+'/'+fd+'/'+fp),proxy:''},
    {url:'https://corsproxy.io/?'+encodeURIComponent('https://proverkacheka.nalog.ru/v2/check/'+fn+'/'+fd+'/'+fp),proxy:''},
    {url:'https://receipt.tax/api/v1/check?fn='+fn+'&fd='+fd+'&fp='+fp+sumParam,proxy:''},
    {url:'https://ofdapi.ru/check?fn='+fn+'&fd='+fd+'&fp='+fp+sumParam,proxy:''}
  ];
  
  var results=await Promise.allSettled(attempts.map(function(a){
    return fetchWithProxy(a.proxy+encodeURIComponent(a.url),hdrs,7000)
  }));
  
  for(var i=0;i<results.length;i++){
    if(results[i].status=='fulfilled'&&results[i].value){
      var v=results[i].value;
      if(v.startsWith('{')||v.startsWith('[')){
        try{return JSON.parse(v)}catch(e){}
      }
      var m=v.match(/{[^]+?"totalSum"[^]+?}/);
      if(m)try{return JSON.parse(m[0])}catch(e){}
      m=v.match(/{[^]+?"items"[^]+?}/);
      if(m)try{return JSON.parse(m[0])}catch(e){}
    }
  }
  return null
}

function formatFull(r,product){
  if(!r)return null;
  if(r.document&&r.document.receipt)r=r.document.receipt;
  if(r.receipt)r=r.receipt;
  if(!r.totalSum&&!r.items)return null;
  
  var s='';
  s+='📄 ЧЕК\n═══════════════════════════════\n';
  if(product)s+='📦 '+product+'\n';
  if(r.user)s+='🏪 '+r.user+'\n';
  if(r.userInn)s+='🔢 ИНН: '+r.userInn+'\n';
  if(r.dateTime)s+='📅 '+(typeof r.dateTime=='string'?r.dateTime.replace('T',' ').slice(0,16):r.dateTime)+'\n';
  if(r.operator)s+='👤 Кассир: '+r.operator+'\n';
  if(r.kktRegId)s+='🖨 ККТ: '+r.kktRegId+'\n';
  
  if(r.taxationType)s+='🏷 Налог: '+r.taxationType+'\n';
  if(r.nds0||r.nds10||r.nds18||r.ndsCalculated10||r.ndsCalculated18){
    s+='📊 НДС: ';
    if(r.nds0)s+='0%='+kop(r.nds0)+' ';
    if(r.nds10)s+='10%='+kop(r.nds10)+' ';
    if(r.nds18)s+='18%='+kop(r.nds18)+' ';
    if(r.ndsCalculated10)s+='р10%='+kop(r.ndsCalculated10)+' ';
    if(r.ndsCalculated18)s+='р18%='+kop(r.ndsCalculated18)+' ';
    s+='\n'
  }
  
  s+='═══════════════════════════════\n  ТОВАРЫ:\n';
  if(r.items&&r.items.length){
    r.items.forEach(function(item,i){
      var name=item.name||'—';
      var price=item.price?kop(item.price):'—';
      var qty=item.quantity||1;
      var sum=item.sum?kop(item.sum):'—';
      s+='  '+(i+1)+'. '+name+'\n     '+price+' x '+qty+' = '+sum+'\n'
    })
  }
  s+='═══════════════════════════════\n';
  s+='💰 ИТОГО: '+kop(r.totalSum)+'\n';
  if(r.cashTotalSum)s+='💵 Наличные: '+kop(r.cashTotalSum)+'\n';
  if(r.ecashTotalSum)s+='💳 Безналичные: '+kop(r.ecashTotalSum)+'\n';
  if(r.prepaidSum)s+='💰 Предоплата: '+kop(r.prepaidSum)+'\n';
  if(r.postpaidSum)s+='💰 Постоплата: '+kop(r.postpaidSum)+'\n';
  if(r.fiscalDriveNumber)s+='🔢 ФН: '+r.fiscalDriveNumber+'\n';
  if(r.fiscalDocumentNumber)s+='📄 ФД: '+r.fiscalDocumentNumber+'\n';
  if(r.fiscalSign)s+='✅ ФП: '+r.fiscalSign+'\n';
  return s
}
function kop(v){return (v/100).toFixed(2)}

async function sc(){
  if(scanning)return;
  $('scannerWrap').classList.add('active');
  $('scanStatus').textContent='Загрузка...';
  try{
    qr=new Html5Qrcode("reader");
    await qr.start({facingMode:"environment"},{fps:10,qrbox:{width:250,height:250}},
      function(t){if(scanning){scanning=false;sp();sr(t)}},function(){});
    scanning=true;$('scanStatus').textContent='Наведите камеру на QR-код'
  }catch(e){$('scanStatus').textContent='Ошибка: '+e.message;setTimeout(function(){$('scannerWrap').classList.remove('active')},2000)}
}
function sp(){if(qr){try{qr.stop();qr.clear()}catch(e){}qr=null}scanning=false;$('scannerWrap').classList.remove('active')}

async function sr(raw){
  lastData=parseQR(raw);lastFull=null;
  var h='<strong>QR данные:</strong><br>';
  for(var k in lastData){
    var lb=k;if(k=='t')lb='Дата';else if(k=='s')lb='Сумма';else if(k=='fn')lb='ФН';else if(k=='i')lb='ФД';else if(k=='fp')lb='ФП';
    h+='<strong>'+lb+':</strong> '+lastData[k]+'<br>'
  }
  h+='<br><em>Запрос полных данных...</em>';
  $('preview').innerHTML=h;$('resultCard').classList.remove('hidden');
  
  lastFull=await getFullReceipt(lastData,lastRaw);
  if(lastFull){
    var f=formatFull(lastFull,'');
    if(f){
      var lines=f.split('\n').slice(0,8).join('<br>');
      $('preview').innerHTML=h+'<br><strong>Полные данные получены!</strong><br>'+lines+'<br>...'
    }
  } else {
    $('preview').innerHTML=h+'<br><em>API nalog.ru не отвечает. Откроется чек на сайте.</em>'
  }
  $('fieldProduct').value='';setTimeout(function(){$('fieldProduct').focus()},300)
}

async function doSend(product){
  if(!lastData)return;
  var msg='';
  if(lastFull)msg=formatFull(lastFull,product);
  if(!msg){
    msg='📄 ЧЕК\n';
    if(product)msg+='📦 '+product+'\n';
    for(var k in lastData){
      var lb=k;if(k=='t')lb='📅';else if(k=='s')lb='💰';else if(k=='fn')lb='🔢';else if(k=='i')lb='📄';else if(k=='fp')lb='✅';
      msg+=lb+': '+lastData[k]+'\n'
    }
  }
  
  try{
    var r=await fetch(TG+'/sendMessage',{
      method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:'chat_id='+CHAT+'&text='+encodeURIComponent(msg)
    });
    var j=await r.json();
    if(!j.ok){tm('Ошибка: '+j.description,1);return}
    
    // .txt файл
    try{
      var fd=new FormData();fd.append('chat_id',CHAT);
      fd.append('document',new Blob([msg],{type:'text/plain;charset=utf-8'}),'chek.txt');
      await fetch(TG+'/sendDocument',{method:'POST',body:fd,mode:'no-cors'})
    }catch(e){}
    
    tm('Отправлено!');
    $('resultCard').classList.add('hidden');lastData=null;lastFull=null
  }catch(e){tm('Нет интернета',1)}
}

$('btnSend').onclick=function(){doSend($('fieldProduct').value.trim())};
$('btnSkip').onclick=function(){doSend('')};
$('btnScan').onclick=sc;$('btnStop').onclick=sp;
</script>
</body>
</html>
