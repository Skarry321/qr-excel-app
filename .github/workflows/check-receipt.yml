name: Check Receipt
on:
  repository_dispatch:
    types: [check]
jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Query nalog.ru
        env:
          FN: ${{ github.event.client_payload.fn }}
          FD: ${{ github.event.client_payload.fd }}
          FP: ${{ github.event.client_payload.fp }}
          RID: ${{ github.event.client_payload.rid }}
        run: |
          mkdir -p relay
          curl -s -H "Device-ID: qr-excel" -H "Device-OS: Linux" -H "Version: 2.0" \
            "https://proverkacheka.nalog.ru/v2/check/$FN/$FD/$FP" \
            -o "relay/$RID.json" --max-time 15 || echo '{"error":"timeout"}' > "relay/$RID.json"
          cat "relay/$RID.json"
      - name: Commit result
        run: |
          git config user.name "QR-Excel"
          git config user.email "bot@qr-excel.app"
          git add relay/
          git diff --staged --quiet || git commit -m "result"
          git push
